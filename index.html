<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz-ul nostru ❤️</title>

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({ appId: "c27e0684-17c5-4fc9-ae98-4181596a229b" });
});
</script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg,#ff4d6d,#ff8fab);
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
  touch-action: manipulation;
}

.container {
  max-width: 650px;
  margin: 30px auto;
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,.3);
  backdrop-filter: blur(6px);
  animation: enter 0.8s ease;
}
@keyframes enter {from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

h2 {margin-bottom:20px;}
button {
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  transition: .2s;
  animation: pulse 2.5s infinite;
}
@keyframes pulse {0%{box-shadow:0 0 0 rgba(255,255,255,.4);}50%{box-shadow:0 0 20px rgba(255,255,255,.8);}100%{box-shadow:0 0 0 rgba(255,255,255,.4);}}
button:hover{transform:scale(1.03);}
.hidden{display:none;}

.heart {
  position: fixed;
  font-size: 20px;
  animation: float 6s linear infinite;
  pointer-events: none;
}
@keyframes float{from{transform:translateY(110vh);opacity:1;}to{transform:translateY(-10vh);opacity:0;}}

#score {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(255,255,255,.25);
  padding: 10px 18px;
  border-radius: 20px;
  font-weight: bold;
  z-index: 1000;
  transition: all 0.3s ease;
}
#score.bounce {animation: bounce 0.6s;}
@keyframes bounce{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}

.glow {animation: glowEffect 1s ease-in-out infinite alternate;}
@keyframes glowEffect{from{box-shadow:0 0 10px #ffeb3b;}to{box-shadow:0 0 25px #ffff00;}}

.strikethrough{position: relative; display:inline-block;}
.strikethrough::after{content:"";position:absolute;left:0;top:50%;width:100%;height:3px;background:red;transform:translateY(-50%);}

#score-message{opacity:0;transition:opacity 0.3s ease;font-size:14px;margin-top:5px;color:#fff;}
#score-message.show{opacity:1;}

/* RESPONSIVE */
@media(max-width:600px){
  body{font-size:18px;}
  .container{margin:15px;padding:20px;}
  h2{font-size:24px;}
  h3{font-size:20px;}
  button{font-size:18px;padding:16px;}
  #score{font-size:16px;}
  #animated-text{font-size:18px;}
}

/* ANIMATIE FINAL: DOI PERSOANE */
.kiss-container{position:relative;height:200px;margin-top:20px;}
.person{width:50px;height:50px;background:pink;border-radius:50%;position:absolute;top:50%;transform:translateY(-50%);}
.person.left{left:0;animation:left-to-center 3s forwards;}
.person.right{right:0;animation:right-to-center 3s forwards;}
.heart-pop{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:30px;opacity:0;animation:heart-pop 3s forwards 2s;}
@keyframes left-to-center{to{left:45%;}}
@keyframes right-to-center{to{right:45%;}}
@keyframes heart-pop{0%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1.5);}100%{opacity:1;transform:scale(1);}}
</style>
</head>

<body>

<div id="score">
  Scor: 0<br>
  <div id="score-message">Femeia mea are mereu dreptate ❤️</div>
</div>

<div class="container" id="quiz">
  <h2>Quiz-ul nostru ❤️</h2>
  <div id="question"></div>
  <div id="answers"></div>
  <div id="animated-text" style="font-size:20px;color:#ffeb3b;margin-top:20px;"></div>
</div>

<div class="container hidden" id="final">
  <h2>Ai terminat quiz-ul! 🥰</h2>
  <div id="animated-text-final" style="margin:10px 0;font-size:20px;color:#ffeb3b;"></div>
  <div class="kiss-container">
    <div class="person left"></div>
    <div class="person right"></div>
    <div class="heart-pop">❤️</div>
  </div>
  <button id="playMusic">🎵 Ascultă muzica noastră arabă 🎵</button>
  <audio id="arabicSong" src="muzica_araba.mp3"></audio>
  <button id="finalize-btn">✅ Finalizează quiz-ul</button>
</div>

<script>
// Quiz
const quiz=[
  { q:"Cu ce subiect te-am cucerit în prima zi?", options:["Horror","Comedie","Sport"] },
  { q:"Ce mi-ai cerut să fac la ora 20:00 când am împlinit prima lună împreună?", options:["Un mesaj foarte frumos","Să trimit un video cu mine","Să trimit o poză cu mine"] },
  { q:"Care a fost primul joc jucat împreună în prima lună?", options:["Adevăr și provocare","Fazan","Roblox"] },
  { q:"Ce am început să facem din august mai des?", options:["Să ne uităm la filme","Să ne jucăm jocuri","Să ne jucăm Fazan"] },
  { q:"Când ai postat primul story pe Instagram despre noi?", options:["19 August","14 August","13 August"] },
  { q:"Când ne-am cunoscut prima dată pe apel?", options:["Octombrie","August","Noiembrie"] },
  { q:"Care este cel mai important lucru din viața mea?", options:["Fericire","Împlinire","Preda Ariana Andreea (viitoarea mea soție)"] }
];

let index=0;
let score=0;

function showQuestion(){
  if(index>=quiz.length){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");
    typeWriter();
    return;
  }

  const question=quiz[index];
  const questionDiv=document.getElementById("question");
  const answersDiv=document.getElementById("answers");
  const animatedDiv=document.getElementById("animated-text");
  const scoreMessage=document.getElementById("score-message");

  questionDiv.innerHTML=`<h3>${question.q}</h3>`;
  answersDiv.innerHTML="";
  animatedDiv.innerHTML="";
  scoreMessage.classList.remove("show");

  question.options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.textContent=opt;

    if(index===quiz.length-1 && opt!=="Preda Ariana Andreea (viitoarea mea soție)"){
      btn.classList.add("strikethrough");
    }

    btn.onclick=()=>{
      score+=5;
      const scoreDiv=document.getElementById("score");
      scoreDiv.innerHTML=`Scor: ${score}<br><div id="score-message">Femeia mea are mereu dreptate ❤️</div>`;
      const sm=document.getElementById("score-message");
      sm.classList.add("show");

      scoreDiv.classList.add("bounce");
      if(navigator.vibrate) navigator.vibrate(120);
      setTimeout(()=>scoreDiv.classList.remove("bounce"),600);
      setTimeout(()=>{ sm.classList.remove("show"); },12000);

      if(index===quiz.length-1){
        Array.from(answersDiv.children).forEach(b=>{
          if(b.textContent!=="Preda Ariana Andreea (viitoarea mea soție)"){
            b.remove();
          } else { b.classList.add("glow"); }
        });
        generateAnimatedText();
      } else { index++; showQuestion(); }
    };
    answersDiv.appendChild(btn);
  });
}

// inimioare animate
function hearts(){
  for(let i=0;i<8;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=4+Math.random()*4+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  }
}
setInterval(hearts,2500);

// animatie text la ultima intrebare
function generateAnimatedText(){
  const textDiv=document.getElementById("animated-text");
  const words=["Fericire","Împlinire"];
  let i=0;
  setInterval(()=>{
    const span=document.createElement("span");
    span.textContent="= "+words[i]+", ";
    span.style.fontWeight="bold";
    span.style.color="#ffeb3b";
    span.style.fontSize="22px";
    textDiv.appendChild(span);
    i=(i+1)%words.length;
  },800);
}

// efect de scriere la final
const finalMessage="❤️ Te iubesc enorm de muult, Ariana ❤️";
let i=0;
function typeWriter(){
  const el=document.getElementById("animated-text-final");
  el.innerHTML="";
  function type(){ 
    if(i<finalMessage.length){
      el.innerHTML+=finalMessage.charAt(i);
      i++; setTimeout(type,100);
    }
  }
  type();
}

// muzica
document.getElementById("playMusic").onclick=()=>{
  document.getElementById("arabicSong").play();
};

// finalizează quiz și notificare
document.getElementById("finalize-btn").onclick=()=>{
  setTimeout(()=>{sendNotification();},300000);
  alert("🎉 Quiz-ul a fost finalizat! În 5 minute vei primi o surpriză pe telefon ❤️");
};

function sendNotification(){
  if("Notification" in window){
    if(Notification.permission==="granted"){
      new Notification("💌 Surpriză!", {body:"Te iubesc enorm de muult ❤️"});
    } else {
      Notification.requestPermission().then(p=>{
        if(p==="granted"){
          new Notification("💌 Surpriză!", {body:"Te iubesc enorm de muult ❤️"});
        } else {
          alert("Te iubesc enorm de muult ❤️");
        }
      });
    }
  } else alert("Te iubesc enorm de muult ❤️");
}

showQuestion();
</script>

</body>
</html>
